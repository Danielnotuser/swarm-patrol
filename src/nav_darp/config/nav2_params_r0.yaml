# ====== Минимальный конфиг Nav2 для следования по готовому пути ======
# Плейсхолдер <robot_namespace> заменится на r0, r1 и т.д.

# ----- Управление жизненным циклом (автозапуск нод) -----
r0:
  lifecycle_manager:
    ros__parameters:
      use_sim_time: False
      autostart: True
      node_names:
        - "controller_server"
        - "bt_navigator"
        - "global_costmap"
        - "local_costmap"

  # ----- Контроллер следования по пути -----
  controller_server:
    ros__parameters:
      use_sim_time: False
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.001
      min_theta_velocity_threshold: 0.001

      progress_checker_plugins: ["progress_checker"]
      goal_checker_plugins: ["goal_checker"]
      controller_plugins: ["FollowPath"]

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

      goal_checker:
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.25
        yaw_goal_tolerance: 0.25
        stateful: True

      FollowPath:
        plugin: "dwb_core::DWBLocalPlanner"
        debug_trajectory_details: False
        min_vel_x: 0.0
        min_vel_y: 0.0
        max_vel_x: 0.26
        max_vel_y: 0.0
        max_vel_theta: 1.0
        min_speed_xy: 0.0
        max_speed_xy: 0.26
        min_speed_theta: 0.0
        acc_lim_x: 2.5
        acc_lim_y: 0.0
        acc_lim_theta: 3.2
        decel_lim_x: -2.5
        decel_lim_y: 0.0
        decel_lim_theta: -3.2
        vx_samples: 20
        vy_samples: 5
        vtheta_samples: 20
        sim_time: 1.7
        linear_granularity: 0.05
        angular_granularity: 0.025
        xy_goal_tolerance: 0.25
        path_length_tolerance: 1.0
        trans_stopped_velocity: 0.25
        short_circuit_trajectory_evaluation: True
        limit_vel_cmd_in_traj: False
        stateful: True
        critics: [ "RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist" ]
        BaseObstacle.scale: 0.02
        PathAlign.scale: 32.0
        GoalAlign.scale: 24.0
        PathAlign.forward_point_distance: 0.1
        GoalAlign.forward_point_distance: 0.1
        PathDist.scale: 32.0
        GoalDist.scale: 24.0
        RotateToGoal.scale: 32.0
        RotateToGoal.slowing_factor: 5.0
        RotateToGoal.lookahead_time: -1.0




  # ----- Дерево поведения (только FollowPath) -----
  bt_navigator:
    ros__parameters:
      use_sim_time: False
      global_frame: robot0_map
      robot_base_frame: robot0_current_pose
      odom_topic: odom
      bt_xml_filename: "follow_path.xml"   # ← простой XML только с FollowPath

  # ----- Глобальная costmap (ваша DARP-карта) -----
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: robot0_map
      robot_base_frame: robot0_current_pose
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: /darp/area   # ваша карта
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

  # ----- Локальная costmap (pointcloud от GPU lidar) -----
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: robot0_map
      robot_base_frame: robot0_current_pose
      robot_radius: 0.22
      resolution: 0.05
      rolling_window: true
      width: 3
      height: 3
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: True
        observation_sources: pointcloud
        pointcloud:
          topic: pointcloud/points
          data_type: "PointCloud2"
          max_obstacle_height: 2.0
          obstacle_min_range: 0.0
          obstacle_max_range: 2.5
          raytrace_min_range: 0.0
          raytrace_max_range: 3.0
          clearing: True
          marking: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55


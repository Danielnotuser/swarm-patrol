controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      path_length_tolerance: 0.10
      yaw_goal_tolerance: 0.25
      stateful: True

    path_handler_plugins: [ "path_handler" ]

    path_handler:
      plugin: "nav2_controller::SimplePathHandler"
      max_robot_pose_search_dist: 5.0
      prune_distance: 0.0
      reject_unit_path: False
      enforce_path_inversion: False

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.2
      min_linear_vel: 0.02
      max_angular_vel: 0.5
      min_angular_vel: -0.5
      max_linear_accel: 0.25
      max_linear_decel: -0.25
      max_angular_accel: 1.0
      max_angular_decel: -1.0
      lookahead_dist: 0.5
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.8
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      use_rotate_to_heading: true
      rotate_to_heading_angle_tolerance: 0.05  # радианы (~3°)
      rotate_to_heading_angular_accel: 1.0   # rad/s²
      rotate_to_heading_max_angular_vel: 0.5 # rad/s
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.05
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.2
      stateful: true
      max_allowed_time_to_collision_up_to_carrot: 5.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 20.0
      publish_frequency: 3.0
      global_frame: robot1_map
      robot_base_frame: r1/laser_frame
      robot_radius: 0.22
      resolution: 0.05
      rolling_window: true
      width: 5
      height: 5
      transform_tolerance: 1.0
      plugins: ["voxel_layer", "denoise_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: True
        transform_tolerance: 0.5
        z_resolution: 0.05
        z_voxels: 16
        origin_z: 0.0
        mark_threshold: 3
        observation_sources: pointcloud
        pointcloud:
          topic: /r1/pointcloud_real
          data_type: "PointCloud2"
          transform_tolerance: 3
          max_obstacle_height: 1.5
          min_obstacle_height: 0.1
          obstacle_min_range: 0.4
          obstacle_max_range: 2.5
          raytrace_min_range: 0.3
          raytrace_max_range: 3.0
          clearing: True
          marking: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.05
      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: True
        # minimal_group_size: 2 removes single-pixel noise
        # 4 removes groups < 4 connected cells
        minimal_group_size: 4
        # connectivity: Way8 uses 8-connected neighbor checking (diagonal counts)
        # Way4 uses 4-connected (only cardinal directions)
        group_connectivity_type: 8
        # treat unknown (NO_INFORMATION) as obstacle for filtering
        no_information_is_obstacle: False

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: robot1_map
      robot_base_frame: r1/laser_frame
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: /r1/darp/area
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    stamp_smoothed_velocity_with_smoothing_time: False
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 2.0]
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: True
    node_names:
      - "controller_server"
      - "smoother_server"
      - "velocity_smoother"
